name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Regenerate Gradle Wrapper
      run: |
        echo "Deleting committed gradle-wrapper.jar to prevent corruption issues..."
        rm -f gradle/wrapper/gradle-wrapper.jar
        echo "Running pre-installed Gradle to generate a fresh, uncorrupted wrapper JAR..."
        gradle wrapper

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore.base64 into debug.keystore..."
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "debug.keystore.base64 not found!"
        fi

    - name: Prepare secrets (.env)
      run: |
        if [ -f .env.example ]; then
          echo "Copying .env.example to .env..."
          cp .env.example .env
        fi

    - name: Grant execute permission for gradlew
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        else
          echo "gradlew not found at root, checking subdirectories..."
          find . -name gradlew -exec chmod +x {} \;
        fi

    - name: Build with Gradle
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug --stacktrace
        else
          echo "Searching for gradlew in subdirectories..."
          GRADLEW_PATH=$(find . -name gradlew -print -quit)
          if [ -n "$GRADLEW_PATH" ]; then
            cd $(dirname "$GRADLEW_PATH")
            ./gradlew assembleDebug --stacktrace
          else
            echo "gradlew not found. Trying global gradle..."
            gradle assembleDebug --stacktrace
          fi
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          **/build/outputs/apk/debug/*.apk
